steps:
  # Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/healthamd-backend', './backend']
  
  # Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/healthamd-frontend', './frontend']

images:
  - 'gcr.io/$PROJECT_ID/healthamd-backend'
  - 'gcr.io/$PROJECT_ID/healthamd-frontend'
